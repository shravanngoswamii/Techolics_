name: Create Release with Standalone EXE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build and Publish EXE
        run: dotnet publish -c Release -r win-x64 --self-contained true /p:TargetFramework=net8.0-windows /p:PublishSingleFile=true /p:PublishTrimmed=false /p:PublishReadyToRun=false /p:PublishProtocol=FileSystem /p:PublishDir="./publish_output/" /p:IncludeAllContentForSelfExtract=true /p:EnableCompressionInSingleFile=true

      - name: Generate Tag Name
        id: generate_tag
        shell: pwsh
        run: |
          $shortHash = git rev-parse --short HEAD
          $tagName = "Techolics_$shortHash"
          echo "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create and Push Git Tag
        shell: pwsh
        run: |
          $tag = "${{ steps.generate_tag.outputs.tag_name }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $tag
          git push origin $tag

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.generate_tag.outputs.tag_name }}
          files: ./publish_output/*.exe
          body: |
            ## Standalone EXE Release

            This release contains the standalone EXE build of the application.
            Download and run on Windows as needed.

            **Version:** ${{ steps.generate_tag.outputs.tag_name }}
